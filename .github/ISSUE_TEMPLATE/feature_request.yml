name: Feature request
description: Suggest a Minerva improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: Describe the pain point first
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the feature you want
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      placeholder: Any workaround or other approach you tried
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Extra context (optional)
      placeholder: Screenshots, mockups, bounty workflow context, etc.
    validations:
      required: false
