name: Build Greasy Fork Additional Info

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "VERSION_HISTORY.md"
      - "Minerva.js"
      - "scripts/build_greasyfork_additional_info.py"
      - ".github/workflows/greasyfork-additional-info.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-additional-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate GREASYFORK_ADDITIONAL_INFO.md
        run: python scripts/build_greasyfork_additional_info.py

      - name: Commit generated file if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add GREASYFORK_ADDITIONAL_INFO.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto-update Greasy Fork additional info"
          git push
